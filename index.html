<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages Finder</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <svg class="github-icon" viewBox="0 0 16 16" fill="currentColor">
                    <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
                </svg>
                <h1>GitHub Pages Finder</h1>
            </div>
        </header>

        <main class="main">
            <nav class="tabs">
                <button class="tab active" data-tab="my-pages">My Pages</button>
                <button class="tab" data-tab="search">Search</button>
            </nav>

            <div class="tab-content active" id="my-pages">
                <p class="tab-description">View GitHub Pages sites for this deployment's owner</p>
                <div id="owner-input" class="search-box">
                    <div class="input-group">
                        <span class="input-prefix">github.com/</span>
                        <input type="text" id="owner-username" placeholder="Enter your username" autocomplete="off">
                    </div>
                    <button id="load-owner-btn">Load My Pages</button>
                </div>
                <div id="loading-owner" class="loading hidden">
                    <div class="spinner"></div>
                    <span>Loading...</span>
                </div>
                <div id="error-owner" class="error hidden"></div>
                <div id="results-owner" class="results hidden">
                    <div class="results-header">
                        <h2 id="owner-title"></h2>
                        <span id="owner-count" class="count-badge"></span>
                    </div>
                    <div id="pages-list-owner" class="pages-list"></div>
                </div>
            </div>

            <div class="tab-content" id="search">
                <div class="search-box">
                    <div class="input-group">
                        <span class="input-prefix">github.com/</span>
                        <input type="text" id="username" placeholder="Enter username" autocomplete="off">
                    </div>
                    <button id="search-btn">Find Pages</button>
                </div>

                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <span>Loading...</span>
                </div>

                <div id="error" class="error hidden"></div>

                <div id="results" class="results hidden">
                    <div class="results-header">
                        <h2 id="results-title"></h2>
                        <span id="results-count" class="count-badge"></span>
                    </div>
                    <div id="pages-list" class="pages-list"></div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>Built with <a href="https://github.com/anomalyco/opencode" target="_blank">opencode</a> &middot; <a href="https://github.com/welkerc/GH-Page-List" target="_blank">View Source</a></p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
